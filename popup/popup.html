<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM Toolkit</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1 id="title">Import to NotebookLM</h1>
        
        <div class="status" id="status">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span id="loading-text">Connecting to NotebookLM...</span>
            </div>
            
            <div class="error hidden" id="error">
                <div class="error-message">
                    <span id="error-text">Please sign in to NotebookLM</span>
                    <button id="open-notebooklm" class="btn btn-primary">Open NotebookLM</button>
                </div>
            </div>
        </div>
        
        <div class="main-content hidden" id="main-content">
            <div class="page-info">
                <div class="page-title" id="page-title">Current Page</div>
                <div class="page-url" id="page-url">https://example.com</div>
            </div>
            
            <div class="form-group">
                <label for="notebook-select" id="notebook-label">Select Notebook:</label>
                <select id="notebook-select" class="form-control">
                    <option value="" id="loading-notebooks">Loading notebooks...</option>
                </select>
            </div>
            
            <div class="actions">
                <button id="import-btn" class="btn btn-primary" disabled>
                    <span id="import-text">Import to Notebook</span>
                </button>
                <button id="create-notebook-btn" class="btn btn-secondary">
                    <span id="create-text">Create New Notebook</span>
                </button>
            </div>
        </div>
        
        <div class="success hidden" id="success">
            <div class="success-message">
                <div class="success-icon">✓</div>
                <span id="success-text">Successfully imported!</span>
                <button id="open-notebook" class="btn btn-primary">Open Notebook</button>
            </div>
        </div>
        
        <div class="footer">
            <div class="options">
                <label class="checkbox-container">
                    <input type="checkbox" id="auto-audio">
                    <span class="checkmark"></span>
                    <span id="auto-audio-text">Auto create audio overview</span>
                </label>
            </div>
            <div class="links">
                <a href="#" id="feedback-link">Feedback</a>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
